- name: Main

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose


- name: Badge Action
  # You may pin to the exact commit or the version.
  # uses: emibcn/badge-action@2f70f25eed9a1b71ffb09535523b460cc8c16d04
  uses: emibcn/badge-action@v1
  with:
    # The left label of the badge, usually static.
    label: 
    # Hex or named color for the label
    label-color: # default is 555
    # The right status as the badge, usually based on results.
    status: 
    # An array (comma separated) with hex or named colors of the badge value background. More than one creates gradient background.
    color: # default is blue
    # Badge style: flat or classic
    style: # default is classic
    # Use icon
    icon: # optional
    # Set this if icon is not square
    icon-width: # optional, default is 13
    # Set badge scale
    scale: # default is 1
    # The file path to store the badge image file. Only output to `badge` action output if undefined.
    path: # optional
